<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MediaRoom</title>
	<meta name="description" content="📺 A minimal and responsive media chat room">
	<link rel="icon" type="image/svg+xml" href="./app/images/mascot.svg">
	<link href="./app/style/mini.css/mini-dark-pro.css" rel="stylesheet"/>
	<link href="./app/style/mr.css" rel="stylesheet"/>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
</head>
<body>
<!-- MAIN CONTAINER: -->
<div class="container" style="display:none">
	<!-- Left Panel: -->
	<div class="left-panel">
		<div class="high-panel">
			<div class="panel-header">
				<div class="inline">
					<img class="panel-mascot" src="./app/images/mascot.svg" alt="mascot"/>
					<span class="panel-title">MEDIA ROOM</span>
				</div>
				<div id="toggle-high-panel">
					<svg class="hb" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" stroke="#eee" stroke-width=".6"
							fill="rgba(0,0,0,0)" stroke-linecap="round">
						<path d="M2,3L5,3L8,3M2,5L8,5M2,7L5,7L8,7"></path>
					</svg>
				</div>
			</div>
			<div id="hiding-zone">
				<button id="copy-room-link" title="Copy room link">
					<img class="copy-icon" src="./app/images/copy-link.svg" alt="copy link"/>
					Link to <span id="room-name"></span>
				</button>
				<div id="media-form" class="media-form">
					<input type="text" id="media-url" aria-label="Video URL or YouTube link" placeholder="Video URL or YouTube link" autocomplete="off"/>
					<button>&#9654;</button>
				</div>
				<div class="users-panel">
					<h2 class="small">In this room:</h2>
					<div id="users-container"></div>
				</div>
			</div>
		</div>
		<!-- Left Panel - Messages box container -->
		<div class="box-container">
			<!-- speech bubbles -->
		</div>
		<!-- Left Panel - Send messages area -->
		<div id="talk-area">
			<textarea id="message" placeholder="Send a message to the room"></textarea>
			<button type="submit" aria-label="Send message">
				<img src="./app/images/send.svg" alt="send" width="15" height="15"/>
			</button>
		</div>
	</div>
	<!-- Divider: -->
	<div class="divider"></div>
	<!-- Right Panel: -->
	<div class="right-panel">
		<video controls poster="./app/images/video-poster.svg">
			<source src="" type="video/mp4">
			<track default kind="descriptions" src=""/>
		</video>
		<div id="yt-player-wrap" style="display:none;">
			<div id="yt-player"></div>
		</div>
	</div>
</div>
<!-- That's a toast to tell what's happening -->
<span class="toast" style="display:none"></span>
<!-- 'Ask Room name' modal -->
<label for="roomname-modal" style="display: none;">Room Name Modal</label>
<input id="roomname-modal" type="checkbox" class="modal">
<div id="modal-roomname-dialog" role="dialog" aria-labelledby="dialog-title">
	<div id="roomname-card" class="card">
		<div class="landing-header">
			<img class="landing-mascot" src="./app/images/mascot.svg" alt="mascot"/>
			<div class="landing-titles">
				<div class="landing-title">Media Room</div>
				<div class="landing-subtitle">Chat and watch videos together</div>
			</div>
		</div>
		<label class="username-question" for="roomname">Join or create a room:</label>
		<div class="roomname-actions">
			<input type="text" id="roomname" autocomplete="off" placeholder="room_name"/>
			<button type="submit">Enter</button>
		</div>
		<div class="username-hint">Letters, numbers and underscores, case insensitive</div>
	</div>
</div>
<!-- 'Ask Username' modal -->
<label for="username-modal" style="display:none">Room Name Modal</label>
<input id="username-modal" type="checkbox" class="modal">
<div id="modal-username-dialog" role="dialog" aria-labelledby="dialog-title">
	<div id="username-card" class="card">
		<div id="room-welcome" title="Copy room link">
			<span class="room-welcome-label">Welcome to the room</span>
			<span class="room-welcome-name-row">
				<span id="room-welcome-name"></span>
				<img class="copy-icon" src="./app/images/copy-link.svg" alt="copy link"/>
			</span>
		</div>
		<div class="modal-close"></div>
		<label class="username-question" for="username">What's your name?</label>
		<input type="text" id="username" autocomplete="name" placeholder="Pseudonym"/>
		<div class="username-hint">Letters, numbers and underscores only</div>
		<div class="username-actions">
			<ul id="listColor">
				<li class="btColor"></li>
				<li class="btColor"></li>
				<li class="btColor"></li>
				<li class="btColor"></li>
				<li class="btColor"></li>
			</ul>
			<button>Enter</button>
		</div>
	</div>
</div>
<div class="github-ribbon-wrap" id="github-ribbon">
	<a href="https://github.com/realjck/media-room" target="_blank" rel="noopener" class="github-ribbon-link">Fork me on GitHub</a>
</div>
</body>
<script src="./app/js/libs/jquery/jquery.min.js"></script>
<script type="module" src="./app/js/iife/ui-feats.js"></script>
<script type="module" src="./app/js/app.js"></script>
</html>
